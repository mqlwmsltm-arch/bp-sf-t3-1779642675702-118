<style>
  :root {
    --primary: #000000;
    --secondary: #ffffff;
    --accent: #ff3b00;
    --font: Impact, system-ui, sans-serif;
    --border: 4px solid var(--accent);
    --box-shadow: 8px 8px 0 var(--accent);
    --gap: 48px;
    --padding: 72px;
    --section-gap: 120px;
  }

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  html {
    scroll-behavior: smooth;
  }

  body {
    font-family: var(--font);
    background: var(--primary);
    color: var(--secondary);
    line-height: 1.2;
    text-transform: uppercase;
    letter-spacing: 0.02em;
    overflow-x: hidden;
  }

  a {
    color: inherit;
    text-decoration: none;
  }

  img, svg {
    display: block;
    max-width: 100%;
  }

  /* 타이포그래피 */
  h1 {
    font-size: clamp(3.5rem, 15vw, 8rem);
    font-weight: 900;
    line-height: 0.85;
    margin-bottom: 0.3em;
  }

  h2 {
    font-size: clamp(2.5rem, 8vw, 5rem);
    font-weight: 700;
    margin-bottom: 0.5em;
  }

  h3 {
    font-size: clamp(1.8rem, 5vw, 3rem);
    font-weight: 700;
  }

  p {
    font-size: 1.2rem;
    max-width: 60ch;
    margin-bottom: 1em;
  }

  .accent {
    color: var(--accent);
  }

  .small {
    font-size: 0.8rem;
    letter-spacing: 0.1em;
  }

  /* 레이아웃 */
  .container {
    padding: 0 var(--padding);
    max-width: none;
  }

  .section-pad {
    padding: var(--padding) 0;
  }

  /* 헤더 */
  header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: var(--padding) var(--padding) 0;
    position: relative;
    z-index: 100;
  }

  .logo {
    font-size: 2rem;
    font-weight: 900;
    letter-spacing: -0.05em;
    border: var(--border);
    padding: 0.2em 0.5em;
    background: var(--primary);
    transform: rotate(-2deg);
  }

  .logo span {
    color: var(--accent);
  }

  /* 네비게이션 */
  .nav-toggle {
    display: none;
  }

  .nav-toggle-label {
    display: none;
    font-size: 2.5rem;
    cursor: pointer;
    line-height: 1;
    z-index: 200;
    position: relative;
    padding: 0.2em;
    border: var(--border);
    background: var(--primary);
  }

  nav ul {
    display: flex;
    gap: var(--gap);
    list-style: none;
    font-size: 1.4rem;
    font-weight: 700;
  }

  nav ul li a {
    border-bottom: 3px solid transparent;
    transition: border-color 0.15s, color 0.15s;
    padding-bottom: 0.1em;
  }

  nav ul li a:hover {
    border-bottom-color: var(--accent);
    color: var(--accent);
  }

  /* 히어로 */
  .hero {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: var(--gap);
    align-items: end;
    padding: var(--padding) var(--padding);
    min-height: 80vh;
    position: relative;
    overflow: hidden;
  }

  .hero::before {
    content: '';
    position: absolute;
    top: -10%;
    left: -10%;
    width: 120%;
    height: 120%;
    background: repeating-linear-gradient(
      45deg,
      transparent,
      transparent 40px,
      rgba(255, 59, 0, 0.03) 40px,
      rgba(255, 59, 0, 0.03) 80px
    );
    z-index: 0;
    pointer-events: none;
  }

  .hero > * {
    position: relative;
    z-index: 1;
  }

  .hero .block-left {
    transform: rotate(-2deg);
    border-left: var(--border);
    padding-left: 1rem;
  }

  .hero .block-right {
    text-align: right;
    transform: rotate(1deg);
    border-right: var(--border);
    padding-right: 1rem;
  }

  .hero .cta {
    grid-column: 1 / -1;
    text-align: center;
    margin-top: 2rem;
  }

  .btn {
    display: inline-block;
    border: var(--border);
    padding: 0.8em 2em;
    font-size: 1.8rem;
    font-weight: 900;
    background: var(--primary);
    color: var(--secondary);
    transition: all 0.15s;
    box-shadow: var(--box-shadow);
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }

  .btn:hover {
    background: var(--accent);
    color: var(--primary);
    box-shadow: 12px 12px 0 var(--secondary);
    transform: scale(1.02);
  }

  /* 섹션 공통 */
  .section-title {
    display: inline-block;
    border-bottom: var(--border);
    padding-bottom: 0.2em;
    margin-bottom: 1.5em;
    font-size: clamp(2rem, 6vw, 4rem);
    transform: rotate(-1deg);
  }

  /* 어바웃 */
  .about-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: var(--gap);
    align-items: center;
  }

  .about-grid .visual {
    background: var(--accent);
    color: var(--primary);
    padding: 2rem;
    font-size: 6rem;
    text-align: center;
    border: var(--border);
    box-shadow: var(--box-shadow);
    transform: rotate(3deg);
    aspect-ratio: 1 / 1;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .about-grid .text {
    border-left: var(--border);
    padding-left: 2rem;
    transform: rotate(-1deg);
  }

  /* 리뷰 */
  .reviews-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: var(--gap);
  }

  .review-card {
    border: var(--border);
    padding: 2rem;
    background: var(--primary);
    position: relative;
    transition: transform 0.2s;
    display: flex;
    flex-direction: column;
    gap: 1rem;
  }

  .review-card:nth-child(odd) {
    transform: rotate(1deg);
  }

  .review-card:nth-child(even) {
    transform: rotate(-2deg);
  }

  .review-card:hover {
    transform: scale(1.02) rotate(0deg);
    box-shadow: var(--box-shadow);
  }

  .review-card .stars {
    color: var(--accent);
    font-size: 1.8rem;
    letter-spacing: 0.2em;
  }

  .review-card .meta {
    display: flex;
    justify-content: space-between;
    font-size: 0.9rem;
    border-top: 2px solid var(--accent);
    padding-top: 1rem;
    margin-top: auto;
  }

  .review-card .meta .name {
    font-weight: 900;
  }

  /* 연락처 */
  .contact-block {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: var(--gap);
    border: var(--border);
    padding: var(--padding);
    background: var(--accent);
    color: var(--primary);
    transform: rotate(-1deg);
  }

  .contact-block .phone {
    font-size: 3rem;
    font-weight: 900;
    word-break: break-all;
  }

  .contact-block .phone a {
    border-bottom: 4px solid var(--primary);
  }

  .contact-block .phone a:hover {
    background: var(--primary);
    color: var(--accent);
  }

  .contact-block .info {
    text-align: right;
    font-size: 1.2rem;
  }

  /* 푸터 */
  footer {
    border-top: var(--border);
    padding: var(--padding);
    text-align: center;
    font-size: 1rem;
    letter-spacing: 0.1em;
    background: var(--primary);
    position: relative;
  }

  footer::before {
    content: '🔥';
    display: block;
    font-size: 3rem;
    margin-bottom: 1rem;
  }

  footer .copyright {
    opacity: 0.6;
  }

  /* 반응형 */
  @media (max-width: 768px) {
    :root {
      --padding: 24px;
      --gap: 24px;
      --section-gap: 60px;
    }

    .hero {
      grid-template-columns: 1fr;
      min-height: auto;
      padding: var(--padding);
    }

    .hero .block-left, .hero .block-right {
      transform: none;
      border-left: none;
      border-right: none;
      text-align: left;
      padding: 0;
    }

    .hero .block-right {
      margin-top: -2rem;
    }

    .about-grid {
      grid-template-columns: 1fr;
    }

    .about-grid .visual {
      aspect-ratio: auto;
      padding: 3rem;
      font-size: 4rem;
    }

    .contact-block {
      grid-template-columns: 1fr;
      transform: none;
    }

    .contact-block .info {
      text-align: left;
    }

    /* 햄버거 메뉴 */
    .nav-toggle-label {
      display: block;
    }

    nav ul {
      display: flex;
      flex-direction: column;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: var(--primary);
      justify-content: center;
      align-items: center;
      gap: 2rem;
      font-size: 2rem;
      transform: translateX(100%);
      transition: transform 0.3s cubic-bezier(0.77, 0, 0.175, 1);
      z-index: 150;
    }

    .nav-toggle:checked ~ nav ul {
      transform: translateX(0);
    }

    /* 메뉴 열렸을 때 레이블 스타일 */
    .nav-toggle:checked + .nav-toggle-label {
      border-color: var(--accent);
      background: var(--accent);
      color: var(--primary);
    }

    .nav-toggle-label {
      position: fixed;
      top: 24px;
      right: 24px;
      z-index: 200;
    }

    header {
      padding: 24px;
    }
  }

  /* 작은 모바일 */
  @media (max-width: 480px) {
    h1 {
      font-size: 2.8rem;
    }

    .btn {
      font-size: 1.4rem;
      padding: 0.6em 1.2em;
    }

    .contact-block .phone {
      font-size: 2rem;
    }
  }

  /* 스크롤바 커스텀 (브루탈리스트) */
  ::-webkit-scrollbar {
    width: 12px;
  }

  ::-webkit-scrollbar-track {
    background: var(--primary);
  }

  ::-webkit-scrollbar-thumb {
    background: var(--accent);
    border: 2px solid var(--secondary);
  }
</style>
</head>
